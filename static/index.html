<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Council">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<title>Council</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --text: #e8e8e8;
  --text-muted: #888;
  --accent: #3b82f6;
  --success: #22c55e;
  --warning: #eab308;
  --danger: #ef4444;
  --purple: #8b5cf6;
  --radius-card: 12px;
  --radius-btn: 8px;
  --radius-pill: 24px;
  --border: #2a2a2a;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: var(--text); background: var(--bg); }
button, input { font-family: inherit; }
.app { height: 100%; display: flex; flex-direction: column; max-width: 100vw; overflow: hidden; }
.topbar {
  position: sticky; top: 0; z-index: 20; background: var(--surface); border-bottom: 1px solid var(--border);
  padding: calc(env(safe-area-inset-top) + 10px) 14px 10px; display: flex; align-items: center; justify-content: space-between;
}
.brand { font-size: 19px; font-weight: 700; letter-spacing: 0.2px; }
.settings-btn { width: 44px; height: 44px; border: 1px solid var(--border); border-radius: 50%; background: var(--surface2); color: var(--text); display: grid; place-items: center; cursor: pointer; }
.settings-btn svg { width: 18px; height: 18px; }
.content { flex: 1; min-height: 0; overflow: hidden; padding-bottom: calc(78px + env(safe-area-inset-bottom)); }
.panel { display: none; height: 100%; overflow: hidden; }
.panel.active { display: block; }
.chat-panel { display: flex; flex-direction: column; height: 100%; }
.chat-messages, .approval-list, .activity-list, .insights { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; }
.msg { max-width: 84%; padding: 10px 12px; border-radius: 12px; font-size: 14px; line-height: 1.45; margin-bottom: 10px; word-wrap: break-word; animation: fadeUp .18s ease; }
.msg.user { margin-left: auto; background: var(--accent); color: #fff; }
.msg.agent { background: var(--surface2); border: 1px solid var(--border); }
.msg.system { margin: 8px auto; background: #1a1a1a; color: var(--text-muted); text-align: center; max-width: 95%; font-size: 12px; }
.msg pre { white-space: pre-wrap; font-family: inherit; }
@keyframes fadeUp { from { opacity: .2; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.action-card { margin-top: 8px; padding: 8px 10px; border-radius: 10px; font-size: 12px; border-left: 4px solid; }
.action-card.auto { border-color: var(--success); background: #132417; }
.action-card.notify { border-color: var(--warning); background: #2a230d; }
.action-card.approve { border-color: #f97316; background: #2a1a0f; }
.action-card.blocked { border-color: var(--danger); background: #2a1212; }
.tier-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
.council-votes { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
.vote-chip { border-radius: var(--radius-pill); padding: 2px 8px; font-size: 11px; }
.vote-chip.APPROVE { background: #16351f; color: var(--success); }
.vote-chip.FLAG { background: #36250e; color: #f59e0b; }
.vote-chip.BLOCK { background: #3a1313; color: var(--danger); }
.chat-input { position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); display: flex; gap: 8px; }
.chat-input input { flex: 1; min-height: 44px; border-radius: var(--radius-pill); border: 1px solid var(--border); background: var(--surface2); color: var(--text); padding: 10px 14px; font-size: 14px; outline: none; }
.chat-input input:focus { border-color: var(--accent); }
.chat-input button { min-height: 44px; padding: 0 16px; border-radius: var(--radius-pill); border: none; background: var(--accent); color: #fff; font-weight: 600; }
.approval-item, .stat-card, .goal-box, .greeting-box, .insights-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-card); }
.approvals-refresh { text-align: center; color: var(--text-muted); font-size: 12px; min-height: 20px; margin-bottom: 8px; transition: transform .15s ease, opacity .15s ease; opacity: .8; }
.approvals-refresh.ready { color: var(--accent); font-weight: 600; opacity: 1; }
.approval-item { padding: 12px; margin-bottom: 10px; animation: fadeUp .18s ease; }
.approval-item.removing { animation: slideOut .22s ease forwards; }
@keyframes slideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(24px); max-height: 0; margin: 0; padding-top: 0; padding-bottom: 0; } }
.approval-item h3 { font-size: 14px; margin-bottom: 5px; line-height: 1.45; }
.meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.approval-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.first-use-badge { border-radius: var(--radius-pill); font-size: 11px; padding: 4px 10px; background: #1f2330; border: 1px solid #2b3657; color: #a9c5ff; white-space: nowrap; }
.approval-verdicts { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.verdict-chip { border-radius: var(--radius-pill); padding: 4px 9px; font-size: 11px; border: 1px solid transparent; display: inline-flex; gap: 4px; align-items: center; }
.verdict-chip.APPROVE { background: #16351f; color: var(--success); border-color: #245c33; }
.verdict-chip.FLAG { background: #36250e; color: #f59e0b; border-color: #614011; }
.verdict-chip.BLOCK { background: #3a1313; color: var(--danger); border-color: #6f1f1f; }
.approval-btns { display: flex; gap: 8px; }
.approval-btns button { flex: 1; }
.btn-approve, .btn-reject { min-height: 44px; border: none; border-radius: var(--radius-btn); color: #fff; font-weight: 700; padding: 0 14px; }
.btn-approve { background: var(--success); }
.btn-reject { background: var(--danger); }
.empty { text-align: center; color: var(--text-muted); padding: 48px 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.empty .check-icon { width: 28px; height: 28px; color: var(--success); }
.event-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px; border-radius: 10px; background: #121212; margin-bottom: 8px; }
.event-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; }
.event-dot.green { background: var(--success); }
.event-dot.yellow { background: var(--warning); }
.event-dot.orange { background: #f97316; }
.event-dot.red { background: var(--danger); }
.event-dot.blue { background: var(--accent); }
.event-dot.gray { background: #6b7280; }
.event-text { flex: 1; font-size: 13px; }
.event-time { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
.activity-filters { display: flex; gap: 8px; margin-bottom: 10px; position: sticky; top: 0; z-index: 5; background: linear-gradient(var(--bg), var(--bg)); padding-bottom: 6px; }
.filter-btn { min-height: 36px; border: 1px solid var(--border); border-radius: var(--radius-pill); background: var(--surface2); color: var(--text-muted); padding: 0 12px; font-size: 12px; }
.filter-btn.active { color: var(--accent); border-color: #2d4d84; background: #142237; }
.event-item { background: #121212; border: 1px solid #202020; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
.event-row { display: flex; gap: 10px; align-items: flex-start; padding: 11px; margin-bottom: 0; }
.event-item.expanded .event-row { border-bottom: 1px solid #212121; }
.event-detail { display: none; padding: 10px 11px 12px 29px; font-size: 12px; color: var(--text-muted); }
.event-item.expanded .event-detail { display: block; }
.event-kv { margin-bottom: 6px; line-height: 1.45; }
.event-kv code { background: #191919; border: 1px solid #2a2a2a; border-radius: 6px; padding: 1px 4px; color: #c7c7c7; }
.event-votes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.timeline-line { position: relative; }
.timeline-line::before { content: ''; position: absolute; left: 15px; top: 26px; bottom: -8px; width: 2px; background: #242424; }
.event-item:last-child .timeline-line::before { display: none; }
.greeting-box { padding: 14px; margin-bottom: 12px; }
.greeting-title { font-size: 22px; font-weight: 700; line-height: 1.2; }
.greeting-goal { margin-top: 6px; color: var(--text-muted); font-size: 13px; line-height: 1.4; }
.stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
.insights-card { padding: 14px; margin-bottom: 12px; }
.insights-card h3 { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
.insights-card p, .insights-card li { font-size: 13px; line-height: 1.45; }
.insights-card ul { margin: 0; padding-left: 18px; display: grid; gap: 6px; }
.muted { color: var(--text-muted); }
.stat-card { padding: 12px; text-align: center; }
.stat-card .number { font-size: 23px; font-weight: 700; }
.stat-card .label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.stat-card.green .number { color: var(--success); }
.stat-card.yellow .number { color: var(--warning); }
.stat-card.orange .number { color: #f59e0b; }
.stat-card.red .number { color: var(--danger); }
.stat-card.blue .number { color: var(--accent); }
.stat-card.purple .number { color: var(--purple); }
.bottom-nav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  height: calc(64px + env(safe-area-inset-bottom)); padding-bottom: env(safe-area-inset-bottom);
  background: rgba(20,20,20,.98); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr);
}
.tab { border: none; background: transparent; color: var(--text-muted); min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 11px; position: relative; }
.tab svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
.tab.active { color: var(--accent); }
.tab .badge {
  position: absolute; right: calc(50% - 26px); top: 8px; min-width: 18px; height: 18px; border-radius: 999px;
  background: var(--danger); color: #fff; font-size: 10px; display: none; align-items: center; justify-content: center; padding: 0 5px;
}
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 60; display: none; }
.modal-overlay.show { display: block; }
.modal {
  position: absolute; left: 0; right: 0; bottom: 0; max-height: 86vh; overflow-y: auto;
  background: var(--surface); border-top-left-radius: 18px; border-top-right-radius: 18px; border-top: 1px solid var(--border);
  padding: 12px 14px calc(14px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform .2s ease;
}
.modal-overlay.show .modal { transform: translateY(0); }
.modal-handle { width: 42px; height: 4px; border-radius: 999px; background: #3a3a3a; margin: 2px auto 12px; }
.modal h2 { font-size: 18px; margin-bottom: 10px; }
.close-btn { float: right; border: none; background: transparent; color: var(--text-muted); font-size: 22px; line-height: 1; padding: 2px 6px; cursor: pointer; }
.q-group { margin-bottom: 14px; }
.q-group label { display: block; font-size: 13px; margin-bottom: 6px; }
.option { display: flex; gap: 8px; align-items: center; padding: 8px; border-radius: 10px; background: #161616; margin-bottom: 6px; }
.option input { accent-color: var(--accent); }
.save-btn { width: 100%; min-height: 44px; border: none; border-radius: var(--radius-btn); background: var(--accent); color: #fff; font-weight: 600; margin-top: 8px; }
.loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #5f5f5f; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.typing-dots{display:inline-flex;gap:4px;align-items:center} .typing-dots span{opacity:0;color:var(--text-muted);font-weight:700;animation:dot 1s infinite;} .typing-dots span:nth-child(1){animation-delay:0s} .typing-dots span:nth-child(2){animation-delay:0.15s} .typing-dots span:nth-child(3){animation-delay:0.3s} @keyframes dot{0%{opacity:0}50%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">Council</div>
    <button class="settings-btn" onclick="openSettings()" aria-label="Open settings">
      <svg viewBox="0 0 24 24"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .54 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 0 1-4 0v-.08a1.7 1.7 0 0 0-.4-1.1 1.7 1.7 0 0 0-1-.54 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.54-1 1.7 1.7 0 0 0-1.1-.4H2.9a2 2 0 0 1 0-4h.08a1.7 1.7 0 0 0 1.1-.4 1.7 1.7 0 0 0 .54-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.54 1.7 1.7 0 0 0 .4-1.1V2.9a2 2 0 0 1 4 0v.08a1.7 1.7 0 0 0 .4 1.1 1.7 1.7 0 0 0 1 .54 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.25.3.43.65.54 1 .11.36.16.74.16 1.13s-.05.77-.16 1.13a2.8 2.8 0 0 1-.54 1Z"></path></svg>
    </button>
  </header>
  <main class="content">
    <section class="panel active" id="panel-chat"><div class="chat-panel"><div class="chat-messages" id="chat-messages"><div class="msg system">Council is active. Agent actions are reviewed before execution.</div></div><div class="chat-input"><input type="text" id="chat-input" placeholder="Tell the agent what to do..." onkeydown="if(event.key==='Enter')sendMessage()"><button id="send-btn" onclick="sendMessage()">Send</button></div></div></section>
    <section class="panel" id="panel-approvals"><div class="approval-list" id="approval-list"><div class="approvals-refresh" id="approvals-refresh">Pull to refresh</div><div class="empty"><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m20 6-11 11-5-5"></path></svg><span>All clear — no actions pending</span></div></div></section>
    <section class="panel" id="panel-activity"><div class="activity-list" id="activity-list"><div class="activity-filters" id="activity-filters"><button class="filter-btn active" data-filter="all" onclick="setActivityFilter('all')">All</button><button class="filter-btn" data-filter="auto" onclick="setActivityFilter('auto')">Auto</button><button class="filter-btn" data-filter="flagged" onclick="setActivityFilter('flagged')">Flagged</button><button class="filter-btn" data-filter="blocked" onclick="setActivityFilter('blocked')">Blocked</button></div><div class="empty">No activity yet. Start chatting.</div></div></section>
    <section class="panel" id="panel-insights"><div class="insights"><div class="greeting-box"><p class="greeting-title" id="greeting-text">Good day</p><p class="greeting-goal" id="goal-text">Goal: Loading...</p></div><div class="stat-grid" id="stat-grid"></div><section class="insights-card"><h3>Today's Summary</h3><p id="summary-text">Loading summary...</p></section><section class="insights-card"><h3>Suggestions</h3><div id="suggestions-list"><p class="muted">Loading suggestions...</p></div></section></div></section>
  </main>
  <nav class="bottom-nav" aria-label="Primary navigation">
    <button class="tab active" data-tab="chat" onclick="switchTab('chat')"><svg viewBox="0 0 24 24"><path d="M4 5h16v10H7l-3 3V5Z"></path></svg><span>Chat</span></button>
    <button class="tab" data-tab="approvals" onclick="switchTab('approvals')"><svg viewBox="0 0 24 24"><path d="m20 6-11 11-5-5"></path></svg><span>Approvals</span><span class="badge" id="approval-badge">0</span></button>
    <button class="tab" data-tab="activity" onclick="switchTab('activity')"><svg viewBox="0 0 24 24"><path d="M3 12h4l2-5 4 10 2-5h6"></path></svg><span>Activity</span></button>
    <button class="tab" data-tab="insights" onclick="switchTab('insights')"><svg viewBox="0 0 24 24"><path d="M4 19h16"></path><path d="M7 15V9"></path><path d="M12 15V5"></path><path d="M17 15v-3"></path></svg><span>Insights</span></button>
  </nav>
</div>
<div class="modal-overlay" id="settings-modal" onclick="if(event.target===this)closeSettings()"><div class="modal" role="dialog" aria-label="Settings"><div class="modal-handle"></div><button class="close-btn" onclick="closeSettings()">×</button><h2>Risk Profile Settings</h2><div id="settings-questions"></div><button class="save-btn" onclick="saveProfile()">Save Profile</button></div></div>
<script>
if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('/static/sw.js').catch(() => {})); }
function switchTab(tab) { document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab)); document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`)); if (tab === 'approvals') loadApprovals(); if (tab === 'activity') loadActivity(); if (tab === 'insights') loadInsights(); }
async function sendMessage() { const input = document.getElementById('chat-input'); const msg = input.value.trim(); if (!msg) return; input.value = ''; addChatMsg('user', msg); document.getElementById('send-btn').disabled = true; addChatMsg('system', '<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span> Agent is thinking...'); try { const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) }); const msgs = document.getElementById('chat-messages'); const lastSystem = msgs.querySelector('.msg.system:last-child'); if (lastSystem && (lastSystem.innerHTML.includes('loading') || lastSystem.innerHTML.includes('typing-dots'))) lastSystem.remove(); if (!res.ok) { const err = await res.json(); addChatMsg('system', `Error: ${err.detail || 'Unknown error'}`); return; } const data = await res.json(); if (data.agent_text) addChatMsg('agent', data.agent_text); if (data.actions?.length) {
      let html = '';
      for (const a of data.actions) {
        const tierClass = getTierClass(a.tier);
        const tierLabel = getTierLabel(a.tier);
        html += `<div class="action-card ${tierClass}" data-action-id="${a.id}">`;
        html += `<div class="tier-label">${tierLabel}${a.first_use_escalated ? ' (first use)' : ''}</div>`;
        html += `<div>${escapeHtml(a.description)}</div>`;
        // Collapsible verdicts
        if (a.council) {
          html += `<button class="show-votes" onclick="(function(btn){const card=btn.closest('.action-card');const d=card.querySelector('.council-details'); if(!d){return;} if(d.style.display==='none'){d.style.display='block'; btn.textContent='Hide verdicts'}else{d.style.display='none'; btn.textContent='Show verdicts'}})(this)">Show verdicts</button>`;
          html += `<div class="council-details" style="display:none;margin-top:6px;font-size:12px;color:var(--text-muted)">`;
          for (const v of a.council.votes) {
            html += `<div><span class="vote-chip ${v.verdict}" style="margin-right:8px">${v.checker}: ${v.verdict}</span><span>${escapeHtml(v.reason)}</span></div>`;
          }
          html += `<div style="font-size:10px;color:var(--text-muted);margin-top:6px">${a.council.total_latency_ms}ms</div>`;
          html += `</div>`;
        }
        // Inline approve/reject for pending
        if (a.status === 'pending_approval') {
          html += `<div style="margin-top:8px;display:flex;gap:8px"><button class="btn-approve" onclick="handleApproval('${a.id}', true)">✓ Approve</button><button class="btn-reject" onclick="handleApproval('${a.id}', false)">✕ Reject</button></div>`;
        }
        if (a.execution_result) {
          html += `<div style="margin-top:6px;color:var(--text-muted);font-size:12px">${escapeHtml(a.execution_result)}</div>`;
        }
        html += `</div>`;
      }
      addChatMsg('agent', html, true);
    }await updateApprovalBadge(); } catch (e) { const msgs = document.getElementById('chat-messages'); const lastSystem = msgs.querySelector('.msg.system:last-child'); if (lastSystem && (lastSystem.innerHTML.includes('loading') || lastSystem.innerHTML.includes('typing-dots'))) lastSystem.remove(); addChatMsg('system', `Error: ${e.message}`); } finally { document.getElementById('send-btn').disabled = false; document.getElementById('chat-input').focus(); } }
function addChatMsg(role, content, isHtml = false) { const msgs = document.getElementById('chat-messages'); const div = document.createElement('div'); div.className = `msg ${role}`; div.innerHTML = isHtml ? content : `<pre>${escapeHtml(content)}</pre>`; msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight; }
async function loadApprovals() {
  const res = await fetch('/api/approvals');
  const data = await res.json();
  const list = document.getElementById('approval-list');
  const pending = data.pending || [];
  const refreshEl = document.getElementById('approvals-refresh');
  if (!pending.length) {
    list.innerHTML = `${refreshEl ? refreshEl.outerHTML : ''}<div class="empty"><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m20 6-11 11-5-5"></path></svg><span>All clear — no actions pending</span></div>`;
    setupApprovalsPullToRefresh();
    return;
  }
  const cards = pending.map(a => {
    const votes = a.council?.votes || [];
    const verdicts = votes.length ? `<div class="approval-verdicts">${votes.map(v => `<span class="verdict-chip ${escapeHtml(v.verdict)}">${escapeHtml(v.checker)}: ${escapeHtml(v.verdict)} · ${escapeHtml((v.reason || '').split('. ')[0] || v.reason || 'No reason')}</span>`).join('')}</div>` : '';
    return `<article class="approval-item" id="approval-${a.id}">
      <div class="approval-top">
        <h3>${escapeHtml(a.description)}</h3>
        ${a.first_use_escalated ? '<span class="first-use-badge">🆕 First time using this tool</span>' : ''}
      </div>
      <div class="meta">Tool: ${escapeHtml(a.tool_name || 'unknown')} · ${new Date(a.timestamp).toLocaleTimeString()}</div>
      ${verdicts}
      <div class="approval-btns">
        <button class="btn-approve" onclick="handleApproval('${a.id}', true)">✓ Approve</button>
        <button class="btn-reject" onclick="handleApproval('${a.id}', false)">✕ Reject</button>
      </div>
    </article>`;
  }).join('');
  list.innerHTML = `${refreshEl ? refreshEl.outerHTML : ''}${cards}`;
  setupApprovalsPullToRefresh();
}

async function handleApproval(actionId, approved) {
  const card = document.getElementById(`approval-${actionId}`);
  if (card) {
    card.classList.add('removing');
    await new Promise(r => setTimeout(r, 220));
  }
  await fetch('/api/approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action_id: actionId, approved }) });
  await loadApprovals();
  await updateApprovalBadge();
}

async function updateApprovalBadge() { const res = await fetch('/api/approvals'); const data = await res.json(); const count = data.pending?.length || 0; const badge = document.getElementById('approval-badge'); badge.textContent = count; badge.style.display = count > 0 ? 'flex' : 'none'; }
async function loadActivity() {
  try {
    const res = await fetch('/api/activity');
    const data = await res.json();
    const list = document.getElementById('activity-list');
    const filterBar = document.getElementById('activity-filters')?.outerHTML || '';
    const events = (data.events || []).filter(matchesActivityFilter);
    if (!events.length) {
      list.innerHTML = `${filterBar}<div class="empty">No activity yet. Start chatting.</div>`;
      return;
    }
    list.innerHTML = `${filterBar}${events.map(renderActivityEvent).join('')}`;
  } catch (e) {
    const list = document.getElementById('activity-list');
    const filterBar = document.getElementById('activity-filters')?.outerHTML || '';
    list.innerHTML = `${filterBar}<div class="empty">Could not load activity feed.</div>`;
  }
}
async function loadInsights() {
  const [statsRes, settingsRes, activityRes] = await Promise.all([
    fetch('/api/insights'),
    fetch('/api/settings'),
    fetch('/api/activity')
  ]);
  const statsData = await statsRes.json();
  const settingsData = await settingsRes.json();
  const activityData = await activityRes.json();

  const name = (settingsData.user_name || 'there').trim();
  const goal = (settingsData.user_goal || statsData.goal || 'No goal set yet').trim();
  document.getElementById('greeting-text').textContent = `${getTimeGreeting()}, ${name}`;
  document.getElementById('goal-text').textContent = `Goal: ${goal}`;

  const s = statsData.stats || {};
  const blockedRejected = Number(s.blocked || 0) + Number(s.rejected || 0);
  document.getElementById('stat-grid').innerHTML = `<div class="stat-card blue"><div class="number">${s.total_actions ?? 0}</div><div class="label">Total actions</div></div><div class="stat-card green"><div class="number">${s.auto_executed ?? 0}</div><div class="label">Auto-executed</div></div><div class="stat-card green"><div class="number">${s.approved ?? 0}</div><div class="label">Approved by you</div></div><div class="stat-card red"><div class="number">${blockedRejected}</div><div class="label">Blocked/Rejected</div></div><div class="stat-card purple"><div class="number">${s.council_evaluations ?? 0}</div><div class="label">Council evaluations</div></div><div class="stat-card blue"><div class="number">${formatLatency(s.avg_council_latency_ms)}</div><div class="label">Avg latency</div></div>`;

  const events = activityData.events || [];
  const summaryText = buildTodaySummary(events, s);
  document.getElementById('summary-text').textContent = summaryText;

  const suggestions = buildSuggestions(events, s);
  const suggestionsList = document.getElementById('suggestions-list');
  if (!suggestions.length) {
    suggestionsList.innerHTML = '<p class="muted">No suggestions yet — keep using Council and we will surface automations here.</p>';
  } else {
    suggestionsList.innerHTML = `<ul>${suggestions.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
  }
}

function getTimeGreeting() {
  const hour = new Date().getHours();
  if (hour < 12) return 'Good morning';
  if (hour < 18) return 'Good afternoon';
  return 'Good evening';
}

function formatLatency(ms) {
  const value = Number(ms || 0);
  return `${Math.round(value)}ms`;
}

function buildTodaySummary(events, stats) {
  const autoCount = Number(stats.auto_executed || 0);
  const approvedCount = Number(stats.approved || 0);
  const blockedCount = Number(stats.blocked || 0) + Number(stats.rejected || 0);
  const total = Number(stats.total_actions || 0);
  const notable = blockedCount > 0
    ? `${blockedCount} actions were blocked or rejected and may need follow-up.`
    : 'No blocked actions today.';
  return `Today Council reviewed ${total} actions: ${autoCount} auto-executed, ${approvedCount} approved by you. ${notable}`;
}

function buildSuggestions(events, stats) {
  const toolApprovals = {};
  for (const e of events || []) {
    if (e.event_type !== 'action_approved') continue;
    const tool = e.details?.tool || 'this action type';
    toolApprovals[tool] = (toolApprovals[tool] || 0) + 1;
  }
  const suggestions = [];
  const repetitiveTool = Object.entries(toolApprovals).sort((a, b) => b[1] - a[1])[0];
  if (repetitiveTool && repetitiveTool[1] >= 3) {
    suggestions.push(`You've approved ${repetitiveTool[1]} ${repetitiveTool[0]} actions today. Want to auto-approve this pattern?`);
  }
  const blockedRejected = Number(stats.blocked || 0) + Number(stats.rejected || 0);
  if (blockedRejected >= 2) {
    suggestions.push('Several actions were blocked/rejected. Consider tightening your goal or updating your risk profile for clearer guardrails.');
  }
  if (!suggestions.length && Number(stats.total_actions || 0) >= 5) {
    suggestions.push('Your approvals look consistent. You can likely auto-approve low-risk repeated actions to speed things up.');
  }
  return suggestions;
}
let settingsQuestions = [];
async function openSettings() { const res = await fetch('/api/onboarding'); const data = await res.json(); settingsQuestions = data.questions || []; const current = data.current_profile || {}; document.getElementById('settings-questions').innerHTML = settingsQuestions.map(q => `<div class="q-group"><label>${escapeHtml(q.question)}</label>${q.options.map(o => `<label class="option"><input type="radio" name="${q.id}" value="${o.value}" ${current[q.id] === o.value ? 'checked' : ''}>${escapeHtml(o.label)}</label>`).join('')}</div>`).join(''); document.getElementById('settings-modal').classList.add('show'); }
function closeSettings() { document.getElementById('settings-modal').classList.remove('show'); }
async function saveProfile() { const answers = {}; for (const q of settingsQuestions) { const checked = document.querySelector(`input[name="${q.id}"]:checked`); if (checked) answers[q.id] = checked.value; } await fetch('/api/profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ answers }) }); closeSettings(); addChatMsg('system', '✓ Risk profile updated'); }
function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getTierClass(t) { if (t === 'tier1_auto') return 'auto'; if (t === 'tier2_notify') return 'notify'; if (t === 'tier3_approve') return 'approve'; if (t === 'tier4_blocked') return 'blocked'; return ''; }
function getTierLabel(t) { if (t === 'tier1_auto') return 'Auto-executed'; if (t === 'tier2_notify') return 'Executed'; if (t === 'tier3_approve') return 'Needs approval'; if (t === 'tier4_blocked') return 'Blocked'; return t; }
function getDotColor(e) { if (e.tier === 'tier1_auto') return 'green'; if (e.tier === 'tier2_notify') return 'yellow'; if (e.tier === 'tier3_approve') return 'orange'; if (e.tier === 'tier4_blocked') return 'red'; if (e.event_type === 'message_received') return 'blue'; if (e.event_type === 'action_approved') return 'green'; if (e.event_type === 'action_rejected') return 'red'; return 'gray'; }
let activityFilter = 'all';
function setActivityFilter(next) {
  activityFilter = next;
  document.querySelectorAll('#activity-filters .filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.filter === next));
  loadActivity();
}
function matchesActivityFilter(e) {
  if (activityFilter === 'all') return true;
  if (activityFilter === 'auto') return e.tier === 'tier1_auto' || e.event_type === 'action_approved';
  if (activityFilter === 'blocked') return e.tier === 'tier4_blocked' || e.event_type === 'action_rejected';
  if (activityFilter === 'flagged') return e.tier === 'tier3_approve' || e.tier === 'tier2_notify' || e.event_type === 'action_approved' || e.event_type === 'action_rejected';
  return true;
}
function renderActivityEvent(e) {
  const time = new Date(e.timestamp).toLocaleTimeString();
  const details = e.details || {};
  const detailBits = [];
  if (details.tool) detailBits.push(`<div class="event-kv"><strong>Tool:</strong> <code>${escapeHtml(details.tool)}</code></div>`);
  if (details.status) detailBits.push(`<div class="event-kv"><strong>Status:</strong> ${escapeHtml(details.status)}</div>`);
  if (details.first_use_escalated) detailBits.push('<div class="event-kv">🆕 First time using this tool</div>');
  if (details.parameters && Object.keys(details.parameters).length) detailBits.push(`<div class="event-kv"><strong>Parameters:</strong> <code>${escapeHtml(JSON.stringify(details.parameters))}</code></div>`);
  const votes = details.council_votes || details.verdicts || [];
  if (votes.length) detailBits.push(`<div class="event-kv"><strong>Council verdicts:</strong><div class="event-votes">${votes.map(v=>`<span class="verdict-chip ${escapeHtml(v.verdict || 'FLAG')}">${escapeHtml(v.checker || 'checker')}: ${escapeHtml(v.verdict || 'FLAG')} · ${escapeHtml(v.reason || 'No reason')}</span>`).join('')}</div></div>`);
  if (!detailBits.length) detailBits.push('<div class="event-kv">No additional details available.</div>');
  return `<article class="event-item" id="event-${escapeHtml(e.id)}"><button class="event-row timeline-line" onclick="toggleEventDetails('${escapeHtml(e.id)}')" style="width:100%;background:transparent;border:none;color:inherit;text-align:left"><span class="event-dot ${getDotColor(e)}"></span><span class="event-text">${escapeHtml(e.summary)}</span><span class="event-time">${time}</span></button><div class="event-detail">${detailBits.join('')}</div></article>`;
}
function toggleEventDetails(id) {
  const el = document.getElementById(`event-${id}`);
  if (!el) return;
  el.classList.toggle('expanded');
}


let approvalsPullBound = false;
function setupApprovalsPullToRefresh() {
  if (approvalsPullBound) return;
  const list = document.getElementById('approval-list');
  let startY = 0;
  let pulling = false;
  const threshold = 60;

  list.addEventListener('touchstart', (e) => {
    if (list.scrollTop <= 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  list.addEventListener('touchmove', (e) => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    const refresh = document.getElementById('approvals-refresh');
    if (!refresh) return;
    if (dy > 0) {
      const offset = Math.min(dy, 80);
      refresh.style.transform = `translateY(${offset / 2}px)`;
      refresh.textContent = dy > threshold ? 'Release to refresh' : 'Pull to refresh';
      refresh.classList.toggle('ready', dy > threshold);
    }
  }, { passive: true });

  list.addEventListener('touchend', async (e) => {
    if (!pulling) return;
    const endY = (e.changedTouches && e.changedTouches[0]?.clientY) || startY;
    const dy = endY - startY;
    const refresh = document.getElementById('approvals-refresh');
    if (refresh) {
      refresh.style.transform = '';
      refresh.classList.remove('ready');
    }
    if (dy > threshold) {
      if (refresh) refresh.textContent = 'Refreshing...';
      await loadApprovals();
      await updateApprovalBadge();
      if (refresh) refresh.textContent = 'Pull to refresh';
    }
    pulling = false;
  }, { passive: true });

  approvalsPullBound = true;
}

setInterval(updateApprovalBadge, 5000);
setInterval(() => { const panel = document.getElementById('panel-activity'); if (panel && panel.classList.contains('active')) loadActivity(); }, 5000);
updateApprovalBadge();
</script>

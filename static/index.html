<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Council">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<title>Council — Verifiable Agent Autonomy Framework</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --surface3: #2e2e2e;
  --text: #e8e8e8; --text2: #a0a0a0; --text3: #666;
  --green: #22c55e; --green-bg: #14301e; --yellow: #eab308; --yellow-bg: #302a10;
  --orange: #f97316; --orange-bg: #301e10; --red: #ef4444; --red-bg: #301414;
  --blue: #3b82f6; --blue-bg: #141e30; --purple: #8b5cf6;
  --border: #2a2a2a; --radius: 10px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
button { cursor: pointer; border: none; font-family: inherit; }

/* ── Top bar ── */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
.topbar h1 { font-size: 18px; font-weight: 600; }
.topbar .tag { font-size: 11px; background: var(--purple); color: #fff; padding: 2px 8px; border-radius: 20px; }
.topbar .settings-btn { margin-left: auto; background: var(--surface2); color: var(--text2); padding: 6px 14px; border-radius: 6px; font-size: 13px; }
.topbar .settings-btn:hover { background: var(--surface3); }

/* ── Tab bar ── */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 500; color: var(--text3); background: none; position: relative; transition: color .15s; }
.tab:hover { color: var(--text2); }
.tab.active { color: var(--text); }
.tab.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px; background: var(--blue); border-radius: 1px; }
.tab .badge { position: absolute; top: 6px; right: calc(50% - 30px); background: var(--orange); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; display: none; }

/* ── Content panels ── */
.content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.panel.active { display: flex; }

/* ── Chat panel ── */
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.5; }
.msg.user { align-self: flex-end; background: var(--blue); color: #fff; }
.msg.agent { align-self: flex-start; background: var(--surface2); }
.msg.system { align-self: center; background: var(--surface3); color: var(--text2); font-size: 12px; text-align: center; max-width: 90%; }
.msg pre { white-space: pre-wrap; font-family: inherit; }
.action-card { margin-top: 8px; padding: 8px 10px; border-radius: 6px; font-size: 12px; border-left: 3px solid; }
.action-card.auto { border-color: var(--green); background: var(--green-bg); }
.action-card.notify { border-color: var(--yellow); background: var(--yellow-bg); }
.action-card.approve { border-color: var(--orange); background: var(--orange-bg); }
.action-card.blocked { border-color: var(--red); background: var(--red-bg); }
.action-card .tier-label { font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
.council-votes { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
.vote-chip { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
.vote-chip.APPROVE { background: var(--green-bg); color: var(--green); }
.vote-chip.FLAG { background: var(--orange-bg); color: var(--orange); }
.vote-chip.BLOCK { background: var(--red-bg); color: var(--red); }

.chat-input { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); }
.chat-input input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; }
.chat-input input:focus { border-color: var(--blue); }
.chat-input button { background: var(--blue); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; }
.chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Approval panel ── */
.approval-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.approval-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.approval-item h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.approval-item .meta { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.approval-item .votes { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.approval-item .vote { font-size: 11px; padding: 3px 8px; border-radius: 4px; }
.approval-btns { display: flex; gap: 8px; }
.btn-approve { background: var(--green); color: #fff; padding: 6px 16px; border-radius: 6px; font-size: 13px; }
.btn-reject { background: var(--red); color: #fff; padding: 6px 16px; border-radius: 6px; font-size: 13px; }
.empty { text-align: center; color: var(--text3); padding: 60px 20px; font-size: 14px; }

/* ── Activity panel ── */
.activity-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
.event-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 6px; font-size: 13px; }
.event-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.event-dot.green { background: var(--green); }
.event-dot.yellow { background: var(--yellow); }
.event-dot.orange { background: var(--orange); }
.event-dot.red { background: var(--red); }
.event-dot.blue { background: var(--blue); }
.event-dot.gray { background: var(--text3); }
.event-text { flex: 1; }
.event-time { color: var(--text3); font-size: 11px; flex-shrink: 0; }

/* ── Insights panel ── */
.insights { flex: 1; overflow-y: auto; padding: 20px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
.stat-card .number { font-size: 28px; font-weight: 600; }
.stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; }
.stat-card.green .number { color: var(--green); }
.stat-card.yellow .number { color: var(--yellow); }
.stat-card.orange .number { color: var(--orange); }
.stat-card.red .number { color: var(--red); }
.stat-card.blue .number { color: var(--blue); }
.stat-card.purple .number { color: var(--purple); }
.goal-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.goal-box h3 { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.goal-box p { font-size: 15px; }

/* ── Settings modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; padding: 24px; }
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal .q-group { margin-bottom: 16px; }
.modal .q-group label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
.modal .option { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.modal .option:hover { background: var(--surface2); }
.modal .option input { accent-color: var(--blue); }
.modal .save-btn { background: var(--blue); color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 14px; width: 100%; margin-top: 12px; }
.modal .close-btn { background: var(--surface2); color: var(--text2); padding: 8px 16px; border-radius: 6px; font-size: 13px; float: right; }
.loading { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--text3); border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <h1>Council</h1>
  <span class="tag">prototype</span>
  <button class="settings-btn" onclick="openSettings()">⚙ Settings</button>
</div>

<div class="tabs">
  <button class="tab active" data-tab="chat" onclick="switchTab('chat')">💬 Chat</button>
  <button class="tab" data-tab="approvals" onclick="switchTab('approvals')">✅ Approvals <span class="badge" id="approval-badge">0</span></button>
  <button class="tab" data-tab="activity" onclick="switchTab('activity')">📡 Activity</button>
  <button class="tab" data-tab="insights" onclick="switchTab('insights')">📊 Insights</button>
</div>

<div class="content">
  <!-- CHAT -->
  <div class="panel active" id="panel-chat">
    <div class="chat-messages" id="chat-messages">
      <div class="msg system">Council is active. Your agent's actions will be evaluated by the Review Council before execution. Type a message to start.</div>
    </div>
    <div class="chat-input">
      <input type="text" id="chat-input" placeholder="Tell the agent what to do..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- APPROVALS -->
  <div class="panel" id="panel-approvals">
    <div class="approval-list" id="approval-list">
      <div class="empty">No actions pending approval</div>
    </div>
  </div>

  <!-- ACTIVITY -->
  <div class="panel" id="panel-activity">
    <div class="activity-list" id="activity-list">
      <div class="empty">No activity yet. Start chatting with the agent.</div>
    </div>
  </div>

  <!-- INSIGHTS -->
  <div class="panel" id="panel-insights">
    <div class="insights" id="insights-content">
      <div class="goal-box" style="margin-bottom:16px">
        <h3>Current Goal</h3>
        <p id="goal-text">Loading...</p>
      </div>
      <div class="stat-grid" id="stat-grid"></div>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <button class="close-btn" onclick="closeSettings()">✕ Close</button>
    <h2>Risk Profile Settings</h2>
    <div id="settings-questions"></div>
    <button class="save-btn" onclick="saveProfile()">Save Profile</button>
  </div>
</div>

<script>
// ── State ──
let pendingCount = 0;
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/static/sw.js').catch((err) => {
      console.warn('Service worker registration failed:', err);
    });
  });
}



// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
  if (tab === 'approvals') loadApprovals();
  if (tab === 'activity') loadActivity();
  if (tab === 'insights') loadInsights();
}

// ── Chat ──
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  addChatMsg('user', msg);
  document.getElementById('send-btn').disabled = true;
  addChatMsg('system', '<span class="loading"></span> Agent is thinking...');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    // Remove loading message
    const msgs = document.getElementById('chat-messages');
    const lastSystem = msgs.querySelector('.msg.system:last-child');
    if (lastSystem && lastSystem.innerHTML.includes('loading')) lastSystem.remove();

    if (!res.ok) {
      const err = await res.json();
      addChatMsg('system', `Error: ${err.detail || 'Unknown error'}`);
      return;
    }

    const data = await res.json();

    // Show agent text
    if (data.agent_text) {
      addChatMsg('agent', data.agent_text);
    }

    // Show action cards
    if (data.actions && data.actions.length > 0) {
      let html = '';
      for (const a of data.actions) {
        const tierClass = getTierClass(a.tier);
        const tierLabel = getTierLabel(a.tier);
        html += `<div class="action-card ${tierClass}">`;
        html += `<div class="tier-label">${tierLabel}${a.first_use_escalated ? ' (first use)' : ''}</div>`;
        html += `<div>${a.description}</div>`;
        if (a.council) {
          html += `<div class="council-votes">`;
          for (const v of a.council.votes) {
            html += `<span class="vote-chip ${v.verdict}" title="${v.reason}">`;
            html += `${v.checker}: ${v.verdict}`;
            html += `</span>`;
          }
          html += `<span style="font-size:10px;color:var(--text3)">${a.council.total_latency_ms}ms</span>`;
          html += `</div>`;
        }
        if (a.execution_result) {
          html += `<div style="margin-top:4px;color:var(--text2);font-size:11px">${a.execution_result}</div>`;
        }
        if (a.status === 'pending_approval') {
          html += `<div style="margin-top:4px;color:var(--orange);font-size:11px">⏳ Awaiting your approval</div>`;
        }
        if (a.status === 'blocked') {
          html += `<div style="margin-top:4px;color:var(--red);font-size:11px">🚫 Blocked by safety council</div>`;
        }
        html += `</div>`;
      }
      addChatMsg('agent', html, true);
    }

    // Update approval badge
    await updateApprovalBadge();

  } catch (e) {
    const msgs = document.getElementById('chat-messages');
    const lastSystem = msgs.querySelector('.msg.system:last-child');
    if (lastSystem && lastSystem.innerHTML.includes('loading')) lastSystem.remove();
    addChatMsg('system', `Error: ${e.message}`);
  } finally {
    document.getElementById('send-btn').disabled = false;
    document.getElementById('chat-input').focus();
  }
}

function addChatMsg(role, content, isHtml = false) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (isHtml) div.innerHTML = content;
  else div.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Approvals ──
async function loadApprovals() {
  try {
    const res = await fetch('/api/approvals');
    const data = await res.json();
    const list = document.getElementById('approval-list');

    if (!data.pending || data.pending.length === 0) {
      list.innerHTML = '<div class="empty">No actions pending approval</div>';
      return;
    }

    list.innerHTML = data.pending.map(a => `
      <div class="approval-item" id="approval-${a.id}">
        <h3>${escapeHtml(a.description)}</h3>
        <div class="meta">Tool: ${a.tool_name} · ${a.first_use_escalated ? '🆕 First use of this tool · ' : ''}${new Date(a.timestamp).toLocaleTimeString()}</div>
        ${a.council ? `<div class="votes">${a.council.votes.map(v => `
          <span class="vote vote-chip ${v.verdict}" title="${escapeHtml(v.reason)}">${v.checker}: ${v.verdict}</span>
        `).join('')}<span style="font-size:10px;color:var(--text3)">${a.council.total_latency_ms}ms</span></div>` : ''}
        ${a.council ? `<div style="font-size:12px;color:var(--text2);margin-bottom:8px">${a.council.votes.map(v => `<div>• ${v.checker}: ${escapeHtml(v.reason)}</div>`).join('')}</div>` : ''}
        <div class="approval-btns">
          <button class="btn-approve" onclick="handleApproval('${a.id}', true)">✓ Approve</button>
          <button class="btn-reject" onclick="handleApproval('${a.id}', false)">✕ Reject</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Failed to load approvals:', e);
  }
}

async function handleApproval(actionId, approved) {
  try {
    const res = await fetch('/api/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action_id: actionId, approved }),
    });
    const data = await res.json();

    // Remove from list
    const el = document.getElementById(`approval-${actionId}`);
    if (el) {
      el.style.opacity = '0.5';
      el.innerHTML = `<div style="text-align:center;padding:10px;color:${approved ? 'var(--green)' : 'var(--red)'}">
        ${approved ? '✓ Approved' : '✕ Rejected'}${data.result ? ': ' + escapeHtml(data.result) : ''}
      </div>`;
      setTimeout(() => { el.remove(); loadApprovals(); }, 1500);
    }

    await updateApprovalBadge();
  } catch (e) {
    console.error('Approval failed:', e);
  }
}

async function updateApprovalBadge() {
  try {
    const res = await fetch('/api/approvals');
    const data = await res.json();
    const count = data.pending?.length || 0;
    const badge = document.getElementById('approval-badge');
    badge.textContent = count;
    badge.style.display = count > 0 ? 'inline' : 'none';
  } catch (e) {}
}

// ── Activity Feed ──
async function loadActivity() {
  try {
    const res = await fetch('/api/activity');
    const data = await res.json();
    const list = document.getElementById('activity-list');

    if (!data.events || data.events.length === 0) {
      list.innerHTML = '<div class="empty">No activity yet. Start chatting with the agent.</div>';
      return;
    }

    list.innerHTML = data.events.map(e => {
      const dotColor = getDotColor(e);
      const time = new Date(e.timestamp).toLocaleTimeString();
      return `<div class="event-row">
        <span class="event-dot ${dotColor}"></span>
        <span class="event-text">${escapeHtml(e.summary)}</span>
        <span class="event-time">${time}</span>
      </div>`;
    }).join('');
  } catch (e) {
    console.error('Failed to load activity:', e);
  }
}

// ── Insights ──
async function loadInsights() {
  try {
    const [statsRes, goalRes] = await Promise.all([
      fetch('/api/insights'),
      fetch('/api/goal'),
    ]);
    const statsData = await statsRes.json();
    const goalData = await goalRes.json();

    document.getElementById('goal-text').textContent = goalData.goal;

    const s = statsData.stats;
    const grid = document.getElementById('stat-grid');
    grid.innerHTML = `
      <div class="stat-card blue"><div class="number">${s.total_actions}</div><div class="label">Total actions</div></div>
      <div class="stat-card green"><div class="number">${s.auto_executed}</div><div class="label">Auto-executed</div></div>
      <div class="stat-card yellow"><div class="number">${s.notified}</div><div class="label">Notified</div></div>
      <div class="stat-card orange"><div class="number">${s.pending_approval}</div><div class="label">Pending</div></div>
      <div class="stat-card green"><div class="number">${s.approved}</div><div class="label">Approved</div></div>
      <div class="stat-card red"><div class="number">${s.blocked + s.rejected}</div><div class="label">Blocked/Rejected</div></div>
      <div class="stat-card purple"><div class="number">${s.council_evaluations}</div><div class="label">Council evals</div></div>
      <div class="stat-card blue"><div class="number">${s.avg_council_latency_ms}</div><div class="label">Avg latency (ms)</div></div>
      <div class="stat-card orange"><div class="number">${s.first_use_escalations}</div><div class="label">First-use flags</div></div>
    `;
  } catch (e) {
    console.error('Failed to load insights:', e);
  }
}

// ── Settings ──
let settingsQuestions = [];
async function openSettings() {
  try {
    const res = await fetch('/api/onboarding');
    const data = await res.json();
    settingsQuestions = data.questions;
    const current = data.current_profile;

    const container = document.getElementById('settings-questions');
    container.innerHTML = data.questions.map(q => `
      <div class="q-group">
        <label>${escapeHtml(q.question)}</label>
        ${q.options.map(o => `
          <label class="option">
            <input type="radio" name="${q.id}" value="${o.value}" ${current[q.id] === o.value ? 'checked' : ''}>
            ${escapeHtml(o.label)}
          </label>
        `).join('')}
      </div>
    `).join('');

    document.getElementById('settings-modal').classList.add('show');
  } catch (e) {
    console.error('Settings load failed:', e);
  }
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('show');
}

async function saveProfile() {
  const answers = {};
  for (const q of settingsQuestions) {
    const checked = document.querySelector(`input[name="${q.id}"]:checked`);
    if (checked) answers[q.id] = checked.value;
  }
  try {
    await fetch('/api/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers }),
    });
    closeSettings();
    addChatMsg('system', '✓ Risk profile updated');
  } catch (e) {
    console.error('Profile save failed:', e);
  }
}

// ── Helpers ──
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getTierClass(tier) {
  if (tier === 'tier1_auto') return 'auto';
  if (tier === 'tier2_notify') return 'notify';
  if (tier === 'tier3_approve') return 'approve';
  if (tier === 'tier4_blocked') return 'blocked';
  return '';
}

function getTierLabel(tier) {
  if (tier === 'tier1_auto') return '● Auto-executed';
  if (tier === 'tier2_notify') return '● Notify';
  if (tier === 'tier3_approve') return '● Requires approval';
  if (tier === 'tier4_blocked') return '● Blocked';
  return tier;
}

function getDotColor(event) {
  if (event.tier === 'tier1_auto') return 'green';
  if (event.tier === 'tier2_notify') return 'yellow';
  if (event.tier === 'tier3_approve') return 'orange';
  if (event.tier === 'tier4_blocked') return 'red';
  if (event.event_type === 'message_received') return 'blue';
  if (event.event_type === 'action_approved') return 'green';
  if (event.event_type === 'action_rejected') return 'red';
  if (event.event_type === 'profile_updated') return 'blue';
  return 'gray';
}

// Poll for approval badge updates
setInterval(updateApprovalBadge, 5000);
</script>
